apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-dnsrecord-viewer-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - dns.contentways.org
  resources:
  - dnsrecords
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dns.contentways.org
  resources:
  - dnsrecords/status
  verbs:
  - get
