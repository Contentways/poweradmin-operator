version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - nilerr
    - revive
    - unparam

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - revive
        path: _test\.go
