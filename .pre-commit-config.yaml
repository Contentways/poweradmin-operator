---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-json
      - id: check-yaml
        exclude: ^(charts/|config/manager/)
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        language: golang
        entry: go mod tidy
        pass_filenames: false

      - id: go-fix
        name: go fix
        language: golang
        entry: go fix ./...
        pass_filenames: false

      - id: make-generate
        name: make generate
        language: system
        entry: make generate
        pass_filenames: false

      - id: make-manifests
        name: make manifests
        language: system
        entry: make manifests
        pass_filenames: false

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
